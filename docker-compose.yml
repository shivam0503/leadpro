services:
  laedpro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laedpro_app
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./master.db:/app/master.db
      - ./data:/app/data
      - ./dbs:/app/dbs
      - ./storage:/app/storage
